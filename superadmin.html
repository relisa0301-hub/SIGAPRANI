<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SUPER ADMIN - SIGAP RANI</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f3f6fb;

}

.header{

height:65px;
background:#1565c0;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;

}

.header h2{

font-size:22px;

}

.header button{

background:#fff;
color:#1565c0;
border:none;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.container{

display:flex;
height:calc(100vh - 65px);

}

.sidebar{

width:250px;
background:white;
box-shadow:2px 0 8px rgba(0,0,0,.1);

}

.sidebar button{

width:100%;
padding:18px;
border:none;
background:white;
text-align:left;
cursor:pointer;
font-size:16px;

}

.sidebar button:hover{

background:#e3f2fd;

}

.content{

flex:1;
padding:25px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

.card{

background:white;
border-radius:12px;
padding:25px;
box-shadow:0 2px 8px rgba(0,0,0,.15);

}

.card h1{

font-size:40px;
color:#1565c0;

}

.card p{

margin-top:10px;

}

</style>

</head>

<body>

<div class="header">

<h2>👑 SUPER ADMIN - SIGAP RANI</h2>

<button onclick="logout()">

Logout

</button>

</div>

<div class="container">

<div class="sidebar">

<button>📊 Dashboard</button>

<button>👨 Kelola Admin</button>

<button>👩 Kelola Guru</button>

<button>🎓 Kelola Siswa</button>

<button>📷 Scan QR</button>

<button>📄 Laporan</button>

<button>📈 Statistik</button>

<button>⚙ Pengaturan</button>

<button>💾 Backup</button>

<button>👤 Profil</button>

</div>

<div class="content">

<div class="grid">

<div class="card">

<h1 id="guru">0</h1>

<p>Total Guru</p>

</div>

<div class="card">

<h1 id="admin">0</h1>

<p>Total Admin</p>

</div>

<div class="card">

<h1 id="siswa">0</h1>

<p>Total Siswa</p>

</div>

<div class="card">

<h1 id="scan">0</h1>

<p>Scan Hari Ini</p>

</div>

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/superadmin.js"></script>

</body>

</html>
